<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bird Eye View Vela</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
    }

    #graph {
      width: 100vw;
      height: 100vh;
    }

    #themeToggle {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 30;
      padding: 8px 12px;
      background: #333;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    /* =======================
       SIDEBAR (DESKTOP + MOBILE)
    ======================= */

    #sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: 280px;
      height: 100vh;
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 10px;
      overflow-y: auto;
      font-size: 14px;
      z-index: 25;
      transition: transform 0.3s ease;
      transform: translateX(0);
      -webkit-overflow-scrolling: touch;
    }

    #sidebar.collapsed {
      transform: translateX(100%);
    }

    /* =======================
       TOGGLE BUTTON
    ======================= */

    #sidebarToggle {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 40;
      padding: 8px 10px;
      background: #333;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    button.small {
      font-size: 12px;
      margin-right: 5px;
      padding: 6px 8px;
    }

    /* =======================
       MOBILE RESPONSIVE
    ======================= */

    @media (max-width: 768px) {

      #sidebar {
        width: 85vw;
      }

      #sidebarToggle {
        top: 12px;
        right: 12px;
        padding: 10px 12px;
      }
    }

  </style>
</head>

<body>

<button id="themeToggle">Light Mode</button>
<button id="sidebarToggle">⟨</button>

<div id="sidebar">
  <h3>Communities</h3>

  <button id="selectAll" class="small">Select All</button>
  <button id="deselectAll" class="small">Deselect All</button>

  <div id="list"></div>
</div>

<div id="graph"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/3d-force-graph"></script>

<script>
let isDark = true;

fetch('graph.json')
.then(r => r.json())
.then(data => {

  const nodesAll = data.nodes.map(n => ({
    id: n.id,
    label: n.label,
    group: n.community || 1
  }));

  const linksAll = data.links.map(l => ({
    source: l.source,
    target: l.target
  }));

  const communities = [...new Set(nodesAll.map(n => n.group))];

  const communityStrength = {};
  communities.forEach(c => communityStrength[c] = 0);

  linksAll.forEach(l => {
    const s = nodesAll.find(n => n.id === (l.source.id || l.source));
    const t = nodesAll.find(n => n.id === (l.target.id || l.target));

    if (s) communityStrength[s.group] += 1;
    if (t) communityStrength[t.group] += 1;
  });

  communities.sort((a, b) =>
    (communityStrength[b] || 0) - (communityStrength[a] || 0)
  );

  let active = new Set(communities);

  const list = document.getElementById("list");

  function renderSidebar() {
    list.innerHTML = "";

    communities.forEach(c => {
      const div = document.createElement("div");
      div.className = "row";

      div.innerHTML = `
        <label>
          <input type="checkbox" id="c_${c}" ${active.has(c) ? "checked" : ""}/>
          Community ${c}
        </label>
        <span>(${communityStrength[c] || 0})</span>
      `;

      list.appendChild(div);

      document.getElementById(`c_${c}`).onchange = (e) => {
        if (e.target.checked) active.add(c);
        else active.delete(c);
        updateVisibility();
      };
    });
  }

  renderSidebar();

  const Graph = ForceGraph3D()
    (document.getElementById('graph'))
    .graphData({ nodes: nodesAll, links: linksAll })
    .nodeLabel(n => n.label || n.id)
    .nodeAutoColorBy('group')
    .nodeRelSize(6)
    .linkWidth(1)
    .linkOpacity(0.4)
    .enableNavigationControls(true)
    .d3Force('charge', d3.forceManyBody().strength(-60))
    .d3Force('link', d3.forceLink().distance(40))
    .d3Force('center', d3.forceCenter(0,0,0))
    .backgroundColor('#0b0b0b');

  function updateVisibility() {
    Graph
      .nodeVisibility(n => active.has(n.group))
      .linkVisibility(l => {
        const s = nodesAll.find(n => n.id === (l.source.id || l.source));
        const t = nodesAll.find(n => n.id === (l.target.id || l.target));
        return s && t && active.has(s.group) && active.has(t.group);
      });

    Graph.refresh();
  }

  updateVisibility();

  document.getElementById("selectAll").onclick = () => {
    active = new Set(communities);
    renderSidebar();
    updateVisibility();
  };

  document.getElementById("deselectAll").onclick = () => {
    active = new Set();
    renderSidebar();
    updateVisibility();
  };

  document.getElementById("themeToggle").onclick = () => {
    isDark = !isDark;

    Graph
      .backgroundColor(isDark ? '#0b0b0b' : '#ffffff')
      .linkColor(() => isDark ? 'rgba(255,255,255,0.4)' : '#000');

    document.getElementById("themeToggle").innerText =
      isDark ? "Light Mode" : "Dark Mode";
  };

  // =========================
  // SIDEBAR TOGGLE (MOBILE READY)
  // =========================

  const sidebar = document.getElementById("sidebar");
  const toggleBtn = document.getElementById("sidebarToggle");

  let collapsed = false;

  toggleBtn.onclick = () => {
    collapsed = !collapsed;
    sidebar.classList.toggle("collapsed", collapsed);
    toggleBtn.innerText = collapsed ? "⟩" : "⟨";
  };

  // AUTO-COLLAPSE ON MOBILE
  if (window.innerWidth < 768) {
    sidebar.classList.add("collapsed");
    collapsed = true;
    toggleBtn.innerText = "⟩";
  }

});
</script>

</body>
</html>
